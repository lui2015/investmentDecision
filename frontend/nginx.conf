server {
    listen 80;
    server_name localhost;

    # index.html 不缓存，确保每次都校验最新版本（避免浏览器缓存旧的资源引用）
    location = /investmentDecision/index.html {
        alias /usr/share/nginx/html/investmentDecision/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # 后端 API 反向代理（须在静态 location 之前按最长前缀匹配命中）
    location /investmentDecision/api/ {
        proxy_pass http://investment-decision-backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /investmentDecision/ {
        alias /usr/share/nginx/html/investmentDecision/;
        try_files $uri $uri/ /investmentDecision/index.html;
    }

    location / {
        return 404;
    }
}
