server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # 子路径部署：静态资源位于 /usr/share/nginx/html/investmentDecision/
    location /investmentDecision/ {
        alias /usr/share/nginx/html/investmentDecision/;
        index index.html;
        try_files $uri $uri/ /investmentDecision/index.html;
    }

    # 访问 /investmentDecision（不带尾斜杠）时重定向到带斜杠路径
    location = /investmentDecision {
        return 301 /investmentDecision/;
    }

    # 直接访问根路径时，也兜底到子应用首页（便于直连容器 8088 端口调试）
    location = / {
        return 301 /investmentDecision/;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
