server {
    listen 80;
    server_name localhost;

    location /investmentDecision/api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /investmentDecision/ {
        alias /usr/share/nginx/html/investmentDecision/;
        try_files $uri $uri/ /investmentDecision/index.html;
    }

    location / {
        return 404;
    }
}
