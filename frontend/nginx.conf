server {
    listen 80;
    server_name localhost;

    # index.html 不缓存，确保每次都校验最新版本（避免浏览器缓存旧的资源引用）
    location = /investmentDecision/index.html {
        alias /usr/share/nginx/html/investmentDecision/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location /investmentDecision/ {
        alias /usr/share/nginx/html/investmentDecision/;
        try_files $uri $uri/ /investmentDecision/index.html;
    }

    location / {
        return 404;
    }
}
