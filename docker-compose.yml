version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: investment-decision-frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: investment-decision-backend
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    environment:
      - JWT_SECRET=investment_decision_jwt_secret_2024_secure_key
      - PORT=3001

volumes:
  backend-data:
